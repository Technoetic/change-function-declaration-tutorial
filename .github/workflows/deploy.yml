name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # npm has a known bug where the optional platform binaries baked into a
      # lockfile generated on another OS (Windows here) are not reinstalled on
      # a different platform. Vite 8 (rolldown) and its CSS minifier
      # (lightningcss) both ship their native bindings as optional deps, so a
      # cached node_modules / cross-OS lockfile leaves the Linux runner without
      # @rolldown/binding-linux-x64-gnu and lightningcss.linux-x64-gnu.
      # The reliable fix is to drop the lockfile and let npm resolve optional
      # deps fresh for this platform. (npm/cli#4828)
      - run: rm -f package-lock.json
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
