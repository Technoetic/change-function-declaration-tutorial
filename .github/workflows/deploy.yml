name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm has a known bug where `npm ci` skips optional platform binaries
      # when the lockfile was generated on a different OS (Windows here).
      # Vite 8 (rolldown) + its CSS minifier (lightningcss) both ship native
      # bindings as optional deps, so `npm ci` leaves Linux runners without
      # @rolldown/binding-linux-x64-gnu and lightningcss.linux-x64-gnu.
      # `npm install` resolves optional deps for the current platform correctly.
      # (npm/cli#4828)
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
