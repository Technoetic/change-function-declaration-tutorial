name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm has a known bug where `npm ci` skips optional platform binaries
      # when the lockfile was generated on a different OS (Windows here).
      # rolldown-vite needs @rolldown/binding-linux-x64-gnu on the runner,
      # so install it explicitly after ci. (npm/cli#4828)
      - run: npm ci
      - run: npm install --no-save @rolldown/binding-linux-x64-gnu
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
